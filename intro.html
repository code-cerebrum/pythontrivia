<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro</title>
    <script src="res/jquery-3.6.2.min.js"></script>
    <style>
        @font-face {
            font-family: Montserrat;
            src: url(res/font/MontserratMedium.ttf);
        }

        body,
        html {
            width: 100vw;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #6f6f6f;
            font-family: Montserrat;
            user-select: none;
            display: flex;
            justify-content: center;
            transition: all 0.3s ease-in;
            align-items: center;
            background-color: white;
        }

        .title {
            width: 100%;
            font-size: xx-large;
            text-align: center;
            animation: title .3s linear;
            color: white;
        } @keyframes title {
            0% {opacity: 0;}
            100% {opacity: 1;}
        }
    </style>
</head>
<body>
    <div class="title">Python Trivia</div>
    <script>
        if (localStorage.darkMode == null)
        {
            localStorage.darkMode = "F";
            localStorage.levelDict = '{"bas":1, "flo":1, "fun":1, "fil":1, "oop":1, "adv":1, "wee":1}';

            localStorage.wrongDict = '{"bas":[], "flo":[], "fun":[], "fil":[], "oop":[], "adv":[], "wee":[]}';
            localStorage.new = 1;
        }

        localStorage.inter =1;
        
        setInterval(() => { location.replace("menu.html"); }, 1900);
        setInterval(() => { $(".title").fadeOut(); }, 1500);
    </script>
</body>

</html>
